name: Build Java Injector DLL

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest # Windows ortamı şart

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17' # Kullandığın Java sürümüne göre değiştirebilirsin
        distribution: 'temurin'

    - name: Build DLL (x64)
      run: |
        # JNI kütüphaneleri için JDK yolunu tanımlıyoruz
        $env:JAVA_HOME = $env:JAVA_HOME_17_X64 
        msbuild your_project.sln /p:Configuration=Release /p:Platform=x64

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: injector-dll-x64
        path: x64/Release/your_project.dll
        
